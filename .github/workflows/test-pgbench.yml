name: pgbench Performance Benchmarks

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly: Monday 6:00 AM UTC
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions: {}

jobs:
  benchmark:
    name: Run pgbench benchmarks
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'Run Benchmarks')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh

      - name: Install pgbouncer
        run: sudo apt-get update && sudo apt-get install -y pgbouncer

      - name: Stop system pgbouncer
        run: sudo systemctl stop pgbouncer || true

      - name: Build
        run: make build

      - name: Restore baseline results
        id: baseline
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/pgbench-baseline/results.json
          key: pgbench-baseline-dummy
          restore-keys: pgbench-baseline-

      - name: Start port pool server
        run: |
          ./bin/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      - name: Run pgbench benchmarks
        env:
          RUN_BENCHMARKS: "1"
          PGBENCH_DURATION: "30"
          PGBENCH_CLIENTS: "1,10,50"
          TEST_PRINT_LOGS: "1"
        run: >-
          go test -json -v -run TestPgBench
          ./go/test/endtoend/queryserving/benchmarking/...
          -timeout 60m
          | tee pgbench-test-results.jsonl
          | go tool tparse -follow

      - name: Stop port pool server
        if: ${{ always() }}
        run: kill "$PORT_POOL_PID" || true

      - name: Find results.json
        id: results
        if: ${{ !cancelled() }}
        run: |
          results_file=$(find /tmp/multigres_pgbench_results -name results.json -type f 2>/dev/null | sort | tail -1)
          if [[ -n "$results_file" ]]; then
            echo "path=$results_file" >> "$GITHUB_OUTPUT"
            echo "Found results at: $results_file"
          else
            echo "No results.json found"
          fi

      - name: Detect TPS regressions
        id: regressions
        if: ${{ !cancelled() && steps.results.outputs.path != '' }}
        env:
          RESULTS_PATH: ${{ steps.results.outputs.path }}
        run: |
          exit_code=0
          .github/scripts/detect-pgbench-regressions.sh \
            /tmp/pgbench-baseline/results.json \
            "$RESULTS_PATH" \
            /tmp/pgbench-regressions \
            || exit_code=$?

          if [[ "$exit_code" -eq 0 ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          elif [[ "$exit_code" -eq 1 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Regression detection script failed with exit code $exit_code"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: pgbench-benchmark-results
          path: /tmp/multigres_pgbench_results/**/*
          if-no-files-found: warn

      - name: Notify Slack on TPS regression
        if: >-
          !cancelled() &&
          steps.regressions.outputs.found == 'true' &&
          github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGBENCH_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          regressions=$(cat /tmp/pgbench-regressions/regressions.json)
          count=$(echo "$regressions" | jq 'length')
          details=$(echo "$regressions" | jq -r '.[] | "- \(.scenario): \(.baseline_tps | round) -> \(.current_tps | round) TPS (-\(.drop_pct)%)"' | head -20)
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(jq -n \
            --arg count "$count" \
            --arg details "$details" \
            --arg url "$run_url" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: (":rotating_light: " + $count + " pgbench TPS regression(s) detected")}},
                {type: "section", text: {type: "mrkdwn", text: ("Scenarios with >15% TPS drop vs. baseline:\n```\n" + $details + "\n```")}},
                {type: "section", text: {type: "mrkdwn", text: ("<" + $url + "|View CI run>")}}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack weekly summary
        if: >-
          !cancelled() &&
          github.event_name != 'pull_request' &&
          steps.results.outputs.path != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGBENCH_WEBHOOK_URL }}
          RESULTS_PATH: ${{ steps.results.outputs.path }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          results_file="$RESULTS_PATH"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Compute average multigateway overhead vs postgres
          payload=$(jq -n \
            --slurpfile results "$results_file" \
            --arg url "$run_url" \
            '
            # Build per-scenario comparison for sustained (non-churn) scenarios
            ($results[0].results | map(select(.connection_churn == false))) as $sustained |

            # Group by scenario name (strip target)
            ($sustained | map(select(.target == "postgres")) |
              [.[] | {key: .scenario, value: .tps}] | from_entries) as $pg_tps |

            ($sustained | map(select(.target == "multigateway")) |
              [.[] | {key: .scenario, value: .tps}] | from_entries) as $mgw_tps |

            # Compute per-scenario overhead
            ([
              $mgw_tps | to_entries[] |
              $pg_tps[.key] as $pg |
              select($pg != null and $pg > 0) |
              {
                scenario: .key,
                pg_tps: ($pg | round),
                mgw_tps: (.value | round),
                overhead: ((1 - .value / $pg) * 100 * 10 | round / 10)
              }
            ]) as $comparisons |

            # Average overhead
            (if ($comparisons | length) > 0 then
              ([$comparisons[].overhead] | add / length * 10 | round / 10)
            else 0 end) as $avg_overhead |

            # Build table text
            ($comparisons | map(
              "| \(.scenario) | \(.pg_tps) | \(.mgw_tps) | \(.overhead)% |"
            ) | join("\n")) as $table_rows |

            {blocks: [
              {type: "header", text: {type: "plain_text",
                text: ("Weekly pgbench: multigateway overhead " + ($avg_overhead | tostring) + "% avg")}},
              {type: "section", text: {type: "mrkdwn",
                text: ("*Sustained Load Results*\n| Scenario | PG TPS | MGW TPS | Overhead |\n|---|---|---|---|\n" + $table_rows)}},
              {type: "section", text: {type: "mrkdwn",
                text: ("<" + $url + "|View CI run>")}}
            ]}
            ')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on test infrastructure failure
        if: >-
          !cancelled() &&
          steps.results.outputs.path == '' &&
          github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGBENCH_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(jq -n \
            --arg url "$run_url" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: "pgbench benchmarks failed to produce results"}},
                {type: "section", text: {type: "mrkdwn", text: "The weekly pgbench run did not produce a `results.json`. The test infrastructure likely failed (e.g. cluster bootstrap timeout, build failure)."}},
                {type: "section", text: {type: "mrkdwn", text: ("<" + $url + "|View CI run>")}}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Prepare baseline for cache save
        if: ${{ !cancelled() && steps.results.outputs.path != '' }}
        env:
          RESULTS_PATH: ${{ steps.results.outputs.path }}
        run: |
          mkdir -p /tmp/pgbench-baseline
          cp "$RESULTS_PATH" /tmp/pgbench-baseline/results.json

      - name: Save current results as new baseline
        if: ${{ !cancelled() && steps.results.outputs.path != '' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/pgbench-baseline/results.json
          key: pgbench-baseline-${{ github.run_id }}
