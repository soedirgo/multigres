name: Code Coverage
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions: {}
jobs:
  coverage-direct:
    name: Direct test coverage
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh
      - name: Build
        run: make build
      - name: Start port pool server
        run: |
          ./bin/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      # Coverage jobs cannot use gotestsum's --rerun-fails: a retry would
      # re-invoke `go test` against the failing package and overwrite the
      # single -coverprofile file, truncating coverage for packages that
      # passed the first time. We instead retry the whole suite on failure,
      # which preserves coverage correctness at the cost of one extra full
      # pass on a flake. test-short / test-race / test-integration handle
      # per-package retries and feed the flake aggregator; coverage just
      # needs to converge on a clean profile without manual restarts.
      - name: Run tests with direct coverage
        shell: bash
        run: |
          set -o pipefail
          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            if go test -json -v -skip TestPostgreSQLRegression \
                -cover -covermode=atomic \
                -coverprofile=coverage-direct.txt \
                -coverpkg=./... ./... \
                | tee coverage-direct-test-results.jsonl \
                | go tool tparse -follow ; then
              break
            fi
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::coverage tests failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::coverage attempt $attempt failed; retrying"
            attempt=$((attempt + 1))
          done

      - name: Stop port pool server
        run: kill "$PORT_POOL_PID" || true
      - name: Upload direct coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-direct
          path: coverage-direct.txt
          retention-days: 7
      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Direct Coverage Tests
          path: coverage-direct-test-results.jsonl
          reporter: golang-json
  coverage-subprocess:
    name: Subprocess coverage
    runs-on: ubuntu-24.04
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh
      - name: Build coverage binaries
        run: make build-coverage
      - name: Start port pool server
        run: |
          ./bin/cov/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      # See note in coverage-direct: we retry the whole suite on failure
      # rather than per-package, because per-package retry would corrupt
      # the GOCOVERDIR output (a clean dir is the simplest invariant).
      - name: Run tests with subprocess coverage
        shell: bash
        run: |
          set -o pipefail
          mkdir -p coverage-subprocess-raw
          export GOCOVERDIR="$PWD/coverage-subprocess-raw"
          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            # Wipe the coverage dir before each attempt so the final
            # profile reflects only the successful pass. The :? guard
            # forces the script to abort if GOCOVERDIR ever ends up
            # empty, so we can never accidentally rm -rf /*.
            rm -rf "${GOCOVERDIR:?}"/*
            if go test -json -v -skip TestPostgreSQLRegression ./... \
                | tee coverage-subprocess-test-results.jsonl \
                | go tool tparse -follow ; then
              break
            fi
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::subprocess coverage tests failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::subprocess coverage attempt $attempt failed; retrying"
            attempt=$((attempt + 1))
          done

      - name: Stop port pool server
        run: kill "$PORT_POOL_PID" || true
      - name: Convert subprocess coverage to text format
        run: go tool covdata textfmt -i=coverage-subprocess-raw -o=coverage-subprocess.txt
      - name: Upload subprocess coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-subprocess
          path: coverage-subprocess.txt
          retention-days: 7
      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Subprocess Coverage Tests
          path: coverage-subprocess-test-results.jsonl
          reporter: golang-json
  merge-and-upload:
    name: Merge coverage and upload
    runs-on: ubuntu-24.04
    needs: [coverage-direct, coverage-subprocess]
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Download direct coverage artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-direct
          path: ./coverage-artifacts/direct
      - name: Download subprocess coverage artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-subprocess
          path: ./coverage-artifacts/subprocess
      - name: Merge coverage files
        run: |
          ./scripts/merge-coverage.sh \
            coverage-artifacts/direct/coverage-direct.txt \
            coverage-artifacts/subprocess/coverage-subprocess.txt \
            coverage-merged.txt

          echo ""
          echo "Final coverage summary:"
          go tool cover -func=coverage-merged.txt | tail -1
      - name: Upload merged coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-merged
          path: coverage-merged.txt
          retention-days: 7
      - name: Upload coverage to Coveralls
        if: success() || failure()
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          file: ./coverage-merged.txt
          format: golang
          parallel: true
          flag-name: merged
  coveralls-finish:
    name: Finish Coveralls upload
    runs-on: ubuntu-24.04
    needs: [coverage-direct, coverage-subprocess, merge-and-upload]
    if: always()
    permissions: {}
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          parallel-finished: true
